<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Pro - 2024</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --bg: #f4f7f6;
            --text: #2c3e50;
        }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            line-height: 1.6; 
            color: var(--text); 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: var(--bg); 
        }
        h1 { text-align: center; font-weight: 300; margin-bottom: 30px; }
        .task-list { list-style: none; padding: 0; }
        .task-item { 
            background: white; 
            margin-bottom: 12px; 
            padding: 18px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            display: flex; 
            align-items: flex-start; 
            transition: all 0.2s ease; 
            cursor: pointer; 
            border-left: 5px solid var(--primary);
        }
        .task-item:active { transform: scale(0.98); }
        input[type="checkbox"] { 
            margin-right: 15px; 
            margin-top: 5px; 
            transform: scale(1.4); 
            cursor: pointer; 
        }
        .task-text { flex-grow: 1; }
        input[type="checkbox"]:checked + .task-text { 
            text-decoration: line-through; 
            color: #a0aec0; 
        }
        .task-item.completed { 
            border-left-color: var(--success); 
            background-color: #f8fff9; 
        }
        .category { 
            font-size: 0.75em; 
            color: var(--primary); 
            font-weight: bold; 
            text-transform: uppercase; 
            display: block; 
            margin-bottom: 4px; 
        }
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--text); display: flex; justify-content: center;
            align-items: center; z-index: 1000; color: white;
        }
    </style>
</head>
<body>

    <div id="app-content" style="display:none;">
        <h1>📋 Mes Objectifs</h1>
        <div class="task-list" id="todo-list">
            <!-- Tâches -->
            <label class="task-item"><input type="checkbox" id="t1"><div class="task-text"><span class="category">Runway / Design</span>Générer les images Runway de l'ERP et de l'App clients K.</div></label>
            <label class="task-item"><input type="checkbox" id="t2"><div class="task-text"><span class="category">SaaS</span>Continuer la génération d'images sur le reste des SaaS restants.</div></label>
            <label class="task-item"><input type="checkbox" id="t3"><div class="task-text"><span class="category">Web / Chatbots</span>Rajouter des chatbots sur le site Jabets et Prestige.</div></label>
            <label class="task-item"><input type="checkbox" id="t4"><div class="task-text"><span class="category">Développement</span>Développer l'ERP via le terminal et sortir une version démo.</div></label>
            <label class="task-item"><input type="checkbox" id="t5"><div class="task-text"><span class="category">Prospection</span>Identifier 20 prospects LinkedIn et envoyer la 1ère page de leur site.</div></label>
            <label class="task-item"><input type="checkbox" id="t6"><div class="task-text"><span class="category">Installation</span>Lancer pack EI ou autre thème gratuit (ThemeForest via Terminal).</div></label>
            <label class="task-item"><input type="checkbox" id="t7"><div class="task-text"><span class="category">Admin / API</span>Envoyer mail à Fineopay pour les clés API.</div></label>
        </div>
    </div>

    <script>
        // 1. Système de mot de passe
        const pass = prompt("Entrez le code d'accès :");
        if (pass === "2024") {
            document.getElementById('app-content').style.display = 'block';
        } else {
            alert("Code incorrect");
            document.body.innerHTML = "<h1 style='margin-top:50px;'>🔒 Accès refusé</h1>";
        }

        // 2. Sauvegarde automatique
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(box => {
            const saved = localStorage.getItem(box.id);
            if (saved === 'true') {
                box.checked = true;
                box.parentElement.classList.add('completed');
            }
            box.addEventListener('change', () => {
                localStorage.setItem(box.id, box.checked);
                box.parentElement.classList.toggle('completed', box.checked);
            });
        });
    </script>
</body>
</html>
